# golangci-lint v2 configuration for dfir-cli
# https://golangci-lint.run/usage/configuration/

version: "2"

run:
  go: "1.26"
  timeout: 5m
  tests: true

output:
  formats:
    - format: colored-line-number
  sort-order:
    - file

linters:
  default: none
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - gosec
    - misspell
    - noctx
    - gofmt
    - gocritic
    - unparam
  settings:
    govet:
      enable-all: true
    gosec:
      excludes:
        - G104 # Unhandled errors on deferred Close calls — too noisy
    gocritic:
      enabled-tags:
        - diagnostic
        - style
      disabled-checks:
        - hugeParam
        - rangeValCopy
    misspell:
      locale: US
  exclusions:
    rules:
      # Exclude gosec from test files — security checks on tests are noisy
      - path: _test\.go
        linters:
          - gosec
      # Exclude errcheck from test files — test assertions handle errors differently
      - path: _test\.go
        linters:
          - errcheck
      # Exclude unparam from test files — test helpers often have unused params
      - path: _test\.go
        linters:
          - unparam
