version: 2

project_name: dfir-cli

before:
  hooks:
    - go run ./cmd/gendocs man man
    - go run ./cmd/gendocs md docs/reference
    - go mod tidy
    - git diff --exit-code go.sum

builds:
  - id: dfir-cli
    main: ./cmd/dfir-cli
    binary: dfir-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/dfir-lab/dfir-cli/internal/version.Version={{.Version}} -X github.com/dfir-lab/dfir-cli/internal/version.Commit={{.Commit}} -X github.com/dfir-lab/dfir-cli/internal/version.Date={{.Date}}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE
      - completions/*
      - man/*
      - docs/reference/*

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"
  algorithm: sha256

nfpms:
  - id: packages
    package_name: dfir-cli
    file_name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    vendor: DFIR Lab
    homepage: https://dfir-lab.ch
    maintainer: "DFIR Lab <info@dfir-lab.ch>"
    description: "DFIR Lab CLI — digital forensics and incident response toolkit"
    license: Proprietary
    formats:
      - deb
      - rpm
    bindir: /usr/local/bin
    contents:
      - src: ./completions/dfir-cli.bash
        dst: /usr/share/bash-completion/completions/dfir-cli
        file_info:
          mode: 0644
      - src: ./completions/_dfir-cli
        dst: /usr/share/zsh/vendor-completions/_dfir-cli
        file_info:
          mode: 0644
      - src: ./completions/dfir-cli.fish
        dst: /usr/share/fish/vendor_completions.d/dfir-cli.fish
        file_info:
          mode: 0644
      - src: ./man/dfir-cli.1
        dst: /usr/share/man/man1/dfir-cli.1
        file_info:
          mode: 0644

brews:
  - repository:
      owner: dfir-lab
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    name: dfir-cli
    description: "DFIR Lab CLI — digital forensics and incident response toolkit"
    homepage: https://dfir-lab.ch
    license: Proprietary
    install: |
      bin.install "dfir-cli"

      bash_completion.install "completions/dfir-cli.bash" => "dfir-cli"
      zsh_completion.install "completions/_dfir-cli"
      fish_completion.install "completions/dfir-cli.fish"
      man1.install Dir["man/*.1"]
    caveats: |
      To get started, make sure Homebrew's bin directory is in your PATH:

        export PATH="$(brew --prefix)/bin:$PATH"

      Then reload your shell session:

        exec $SHELL -l

      Configure your API key:

        dfir-cli config init

      Get your API key from https://dfir-lab.ch
    test: |
      system "#{bin}/dfir-cli", "--version"

scoops:
  - repository:
      owner: dfir-lab
      name: scoop-bucket
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    name: dfir-cli
    description: "DFIR Lab CLI — digital forensics and incident response toolkit"
    homepage: https://dfir-lab.ch
    license: Proprietary

changelog:
  disable: true

snapshot:
  name_template: "{{ .Tag }}-next"

release:
  github:
    owner: dfir-lab
    name: dfir-cli-releases
  draft: false
  header: |
    ## DFIR CLI {{ .Version }}

    ### Install

    **Homebrew (macOS/Linux):**
    ```bash
    brew install dfir-lab/tap/dfir-cli
    ```

    **Scoop (Windows):**
    ```powershell
    scoop bucket add dfir-lab https://github.com/dfir-lab/scoop-bucket.git
    scoop install dfir-cli
    ```

    **Linux (curl):**
    ```bash
    curl -fsSL https://raw.githubusercontent.com/dfir-lab/dfir-cli-releases/main/install.sh | sh
    ```

    **Windows (PowerShell):**
    ```powershell
    iwr https://raw.githubusercontent.com/dfir-lab/dfir-cli-releases/main/install.ps1 | iex
    ```

    **Debian/Ubuntu:**
    ```bash
    sudo dpkg -i dfir-cli_{{ .Version }}_linux_amd64.deb
    ```

    **RPM-based:**
    ```bash
    sudo rpm -i dfir-cli_{{ .Version }}_linux_amd64.rpm
    ```

    **Manual download:**
    Download the appropriate archive from the assets below and extract the binary.
